<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login / Registro</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #4a90e2, #50c9c3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 15px;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      background: #4a90e2;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #357abd;
    }

    .toggle {
      color: #4a90e2;
      cursor: pointer;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Formulario Login -->
    <div id="loginFormDiv">
      <h2>Iniciar Sesión</h2>
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Usuario" required>
        <input type="password" id="loginPassword" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
      </form>
      <p class="toggle" onclick="toggleForms()">¿No tienes cuenta? Regístrate</p>
    </div>

    <!-- Formulario Registro -->
    <div id="registerFormDiv" class="hidden">
      <h2>Crear Cuenta</h2>
      <form id="registerForm">
        <input type="text" id="registerUsername" placeholder="Usuario" required>
        <input type="password" id="registerPassword" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
      </form>
      <p class="toggle" onclick="toggleForms()">¿Ya tienes cuenta? Inicia sesión</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
